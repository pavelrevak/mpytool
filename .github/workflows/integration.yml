name: Integration Tests

on:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -e .
      - run: python -m unittest discover tests/ -v

  linux-integration:
    runs-on: [self-hosted, linux]
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        device: [ESP32S3]
    steps:
      - uses: actions/checkout@v4
      - name: Load device config
        run: source ~/bin/ci-load-env.sh
      - name: Setup venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e .
      - name: Integration tests (${{ matrix.device }})
        env:
          PATH: ${{ github.workspace }}/.venv/bin:$PATH
          MPYTOOL_TEST_PORT_RW: ${{ env[format('MPYTOOL_TEST_{0}', matrix.device)] }}
        run: python -m unittest tests.test_integration tests.test_cli -v

  win-integration:
    runs-on: [self-hosted, windows]
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        device: [ESP32]
    steps:
      - uses: actions/checkout@v4
      - name: Load device config
        run: |
          $conf = Get-Content "$env:USERPROFILE\.config\mpytool\devices.conf" -Raw
          $device = "${{ matrix.device }}".ToLower()
          $inSection = $false
          foreach ($line in $conf -split "`n") {
            $line = $line.Trim()
            if ($line -match "^\[$device\]$") { $inSection = $true; continue }
            if ($line -match "^\[") { $inSection = $false; continue }
            if ($inSection -and $line -match "^win_port\s*=\s*(.+)$") {
              "MPYTOOL_TEST_PORT_RW=$($Matches[1].Trim())" | Out-File -Append $env:GITHUB_ENV
            }
          }
        shell: pwsh
      - name: Install package
        run: |
          C:\Users\vlk\.venv\Scripts\pip install -e .
        shell: cmd
      - name: Integration tests (${{ matrix.device }})
        run: |
          C:\Users\vlk\.venv\Scripts\python -m unittest tests.test_integration tests.test_cli -v
        shell: cmd
